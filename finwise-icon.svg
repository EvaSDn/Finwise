<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3b567"/>
      <stop offset="100%" stop-color="#b8853f"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="0" y="0" width="100" height="100" rx="26" fill="url(#gold)"/>

  <!-- F letterform -->
  <rect x="24" y="22" width="11" height="54" rx="4" fill="#181205"/>
  <rect x="24" y="22" width="34" height="10.5" rx="4" fill="#181205"/>
  <rect x="24" y="44.5" width="25" height="10" rx="4" fill="#181205"/>

  <!-- ascending sparkline accent, sits apart in the lower-right -->
  <polyline points="58,80 68,80 74,68 82,52"
            fill="none" stroke="#181205" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="82" cy="52" r="5.6" fill="#181205"/>
  <circle cx="82" cy="52" r="2.3" fill="#e3b567"/>
</svg>
