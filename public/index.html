<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finwise — Portfolio Simulator</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20viewBox%3D%220%200%20100%20100%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22gold%22%20x1%3D%220%25%22%20y1%3D%220%25%22%20x2%3D%22100%25%22%20y2%3D%22100%25%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%23e3b567%22/%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%23b8853f%22/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20x%3D%220%22%20y%3D%220%22%20width%3D%22100%22%20height%3D%22100%22%20rx%3D%2226%22%20fill%3D%22url%28%23gold%29%22/%3E%3Crect%20x%3D%2224%22%20y%3D%2222%22%20width%3D%2211%22%20height%3D%2254%22%20rx%3D%224%22%20fill%3D%22%23181205%22/%3E%3Crect%20x%3D%2224%22%20y%3D%2222%22%20width%3D%2234%22%20height%3D%2210.5%22%20rx%3D%224%22%20fill%3D%22%23181205%22/%3E%3Crect%20x%3D%2224%22%20y%3D%2244.5%22%20width%3D%2225%22%20height%3D%2210%22%20rx%3D%224%22%20fill%3D%22%23181205%22/%3E%3Cpolyline%20points%3D%2258%2C80%2068%2C80%2074%2C68%2082%2C52%22%20fill%3D%22none%22%20stroke%3D%22%23181205%22%20stroke-width%3D%225%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3Ccircle%20cx%3D%2282%22%20cy%3D%2252%22%20r%3D%225.6%22%20fill%3D%22%23181205%22/%3E%3Ccircle%20cx%3D%2282%22%20cy%3D%2252%22%20r%3D%222.3%22%20fill%3D%22%23e3b567%22/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>

<body>
  <div id="root"></div>

  <!-- Confirmation modal (orders & deposits) -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <h3 id="modal-title"></h3>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-warning" id="modal-warning" style="display:none;"></div>
      <label class="confirm-check" id="modal-check-wrap" style="display:none;">
        <input type="checkbox" id="modal-check">
        <span id="modal-check-label"></span>
      </label>
      <div class="modal-actions">
        <button class="btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- News detail window -->
  <div class="modal-backdrop" id="news-modal-backdrop">
    <div class="modal news-modal" role="dialog" aria-modal="true" aria-labelledby="news-modal-title">
      <button class="modal-close" id="news-modal-close" type="button" aria-label="Close">✕</button>
      <div id="news-modal-image"></div>
      <div class="news-meta" id="news-modal-meta"></div>
      <h3 id="news-modal-title"></h3>
      <div class="news-modal-summary" id="news-modal-summary"></div>
      <div id="news-modal-companies"></div>
      <div class="modal-actions">
        <a class="btn-ghost" id="news-modal-link" href="#" target="_blank" rel="noopener noreferrer"
          style="display:none;">Read original article ↗</a>
        <button class="btn-primary" id="news-modal-ok" type="button">Close</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>

</html>
