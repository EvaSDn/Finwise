<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finwise — Portfolio Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="root"></div>

<!-- Confirmation modal (orders & deposits) -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" role="dialog" aria-modal="true">
    <h3 id="modal-title"></h3>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-warning" id="modal-warning" style="display:none;"></div>
    <label class="confirm-check" id="modal-check-wrap" style="display:none;">
      <input type="checkbox" id="modal-check">
      <span id="modal-check-label"></span>
    </label>
    <div class="modal-actions">
      <button class="btn-ghost" id="modal-cancel">Annuler</button>
      <button class="btn-primary" id="modal-confirm">Confirmer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
